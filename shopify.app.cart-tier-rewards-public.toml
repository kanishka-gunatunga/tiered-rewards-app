# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "204f64bb421473fb6aacf675c3e1ab41"
application_url = "https://rewards.aicloud24.com"
embedded = true
name = "CartQuest"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_metaobjects,write_metaobject_definitions,write_discounts"
optional_scopes = [ ]
use_legacy_install_flow = false

# Tier rewards program settings (one entry per shop; tiers stored as JSON array).
# Storefront + discount function read this; admin app writes via metaobjectUpsert.
# Type in GraphQL/Liquid: $app:tier_rewards_config
[metaobjects.app.tier_rewards_config]
name = "Tier Rewards Config"
description = "Cart spend tiers, discount amounts, and storefront messages for the rewards program"
display_name_field = "title"

  [metaobjects.app.tier_rewards_config.access]
  admin = "merchant_read_write"
  storefront = "public_read"

[metaobjects.app.tier_rewards_config.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.tier_rewards_config.fields.enabled]
name = "Program enabled"
type = "boolean"

[metaobjects.app.tier_rewards_config.fields.program_title]
name = "Program title"
type = "single_line_text_field"

[metaobjects.app.tier_rewards_config.fields.homepage_subtitle]
name = "Homepage subtitle"
type = "single_line_text_field"

[metaobjects.app.tier_rewards_config.fields.tiers]
name = "Tiers"
type = "json"
required = true

[metaobjects.app.tier_rewards_config.fields.primary_color]
name = "Primary color"
type = "color"

[metaobjects.app.tier_rewards_config.fields.secondary_color]
name = "Secondary color"
type = "color"

[metaobjects.app.tier_rewards_config.fields.background_color]
name = "Background color"
type = "color"

# Checkout function reads this JSON from the automatic app discount (synced on admin Save).
[discount.metafields.app.tier_rewards_config]
type = "json"
name = "Tier rewards function config"
access.admin = "merchant_read_write"
access.storefront = "none"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  uri = "/webhooks/compliance"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[auth]
redirect_urls = [
  "https://rewards.aicloud24.com/auth/callback",
  "https://rewards.aicloud24.com/auth/shopify/callback",
  "https://rewards.aicloud24.com/api/auth/callback"
]

[build]
automatically_update_urls_on_dev = true
