query CartInput {
  cart {
    cost {
      subtotalAmount {
        amount
      }
    }
    lines {
      id
      cost {
        subtotalAmount {
          amount
        }
      }
    }
  }
  discount {
    discountClasses
    metafield(key: "tier_rewards_config") {
      jsonValue
    }
  }
  shop {
    metaobject(handle: {type: "$app:tier_rewards_config", handle: "default"}) {
      enabled: field(key: "enabled") {
        value
      }
      tiers: field(key: "tiers") {
        jsonValue
      }
    }
  }
}
